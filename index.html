<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <title>รับแจ้งเตือนผ่าน LINE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root { --primary: #00B900; --primary-dark: #009900; }
    body {
      font-family: 'Sarabun', sans-serif; background-color: #f4f6f9; color: #333;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box;
    }
    .container {
      background: #ffffff; width: 100%; max-width: 400px;
      border-radius: 16px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); overflow: hidden; text-align: center;
    }
    .header { background: var(--primary); padding: 30px 20px; color: white; }
    .header i { font-size: 50px; margin-bottom: 10px; }
    .header h2 { margin: 0; font-size: 22px; }
    .form-content { padding: 30px 20px; }
    .input-group { margin-bottom: 20px; text-align: left; }
    .input-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; }
    .input-group input {
      width: 100%; padding: 12px 15px; border: 1px solid #ddd;
      border-radius: 8px; font-family: 'Sarabun', sans-serif; font-size: 15px; box-sizing: border-box;
    }
    .input-group input:focus { border-color: var(--primary); outline: none; }
    .btn-submit {
      background: var(--primary); color: white; border: none; width: 100%;
      padding: 14px; border-radius: 8px; font-size: 16px; font-weight: 700;
      cursor: pointer; transition: 0.3s; font-family: 'Sarabun', sans-serif;
    }
    .btn-submit:disabled { background: #cccccc; cursor: not-allowed; }
    .message-box { margin-top: 15px; padding: 12px; border-radius: 8px; font-size: 14px; font-weight: 600; display: none; }
    .success { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }
    .error { background: #ffebee; color: #c62828; border: 1px solid #ffcdd2; }
    .loader { display: none; border: 3px solid #f3f3f3; border-top: 3px solid var(--primary); border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; margin: 0 auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="container">
    <div class="header">
      <i class="fab fa-line"></i>
      <h2>รับแจ้งเตือนผ่าน LINE</h2>
    </div>
    
    <div class="form-content">
      <form id="bindForm" onsubmit="submitBind(event)">
        <div class="input-group">
          <label>กรอกอีเมลที่ใช้ลงทะเบียน</label>
          <input type="email" id="email" placeholder="example@email.com" required>
        </div>

        <div id="uidBox" style="display: none; background: #f8f9fa; padding: 10px; border-radius: 8px; margin-bottom: 20px; border: 1px dashed #ccc; text-align: left;">
        <small style="color: #666; font-weight: bold; display: block; margin-bottom: 4px;">LINE User ID ของคุณ:</small>
        <code id="displayUid" style="color: #d63384; word-break: break-all; font-size: 13px;">กำลังโหลด...</code>
      </div>

        <button type="submit" id="btnSubmit" disabled>
          <span id="btnText">กำลังเชื่อมต่อ LINE...</span>
          <div class="loader" id="loadingSpinner"></div>
        </button>

        <div id="msgBox" class="message-box"></div>
      </form>
    </div>
  </div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script>
    // ==========================================
    // 🛑 ใส่ข้อมูลของคุณตรงนี้ 2 จุดครับ 🛑
    // ==========================================
    const MY_LIFF_ID = "2009577141-fpEDj92S"; // LIFF ID ของคุณ
    const GAS_API_URL = "https://script.google.com/macros/s/AKfycbz8syQhGQB9_mXx7XcLCCZyDgvIALgBcRP6dpnpcHvssxLjSNzC3P8o8lpzCCie4jXdYQ/exec"; 
    // ==========================================

    let currentLineUid = "";

    async function initializeLiff() {
      try {
        await liff.init({ liffId: MY_LIFF_ID }); 
        
        if (liff.isLoggedIn()) {
          const profile = await liff.getProfile();
          currentLineUid = profile.userId; 
          
          document.getElementById('btnSubmit').disabled = false;
          document.getElementById('btnText').innerText = "ยืนยันการผูกบัญชี";
        } else {
          liff.login(); // คราวนี้ login ได้สบายๆ ไม่มี Error Insecure มากวนแล้วครับ
        }
      } catch (err) {
        console.error("LIFF Init Error", err);
        document.getElementById('btnText').innerText = "โหลดข้อมูลไม่สำเร็จ";
      }
    }
    
    window.onload = initializeLiff;

    // ... โค้ดส่วน UI และ LIFF อื่นๆ เหมือนเดิม ...

function submitBind(event) {
  event.preventDefault();
  
  const GAS_API_URL = "https://script.google.com/macros/s/AKfycbz8syQhGQB9_mXx7XcLCCZyDgvIALgBcRP6dpnpcHvssxLjSNzC3P8o8lpzCCie4jXdYQ/exec"; // 👈 ก๊อปปี้ลิงก์ /exec มาใส่ตรงนี้
  
  const data = {
    email: document.getElementById('email').value,
    lineUid: currentLineUid // ตัวแปรนี้ต้องได้ค่ามาจาก liff.getProfile()
  };

  fetch(GAS_API_URL, {
  method: "POST",
  body: JSON.stringify(data) // data จะมี { email: ..., lineUid: ... }
})
.then(response => response.json())
.then(res => {
  const msgBox = document.getElementById('msgBox');
  const spinner = document.getElementById('loadingSpinner');
  const btnText = document.getElementById('btnText');
  const btnSubmit = document.getElementById('btnSubmit');

  spinner.style.display = 'none';
  btnText.style.display = 'inline';
  btnSubmit.disabled = false;

  if (res.success) {
    msgBox.innerText = "✅ " + res.message; // จะขึ้นว่า "ผูกบัญชีสำเร็จ! บันทึกข้อมูลลง Column P..."
    msgBox.className = "message-box success";
    msgBox.style.display = "block";
    
    // ถ้าเปิดในแอป LINE ให้ปิดหน้าต่างอัตโนมัติใน 3 วินาที
    setTimeout(() => {
      if (liff.isInClient()) liff.closeWindow();
    }, 3000);
  } else {
    msgBox.innerText = "❌ " + res.message; // จะขึ้นว่า "ไม่พบอีเมล..."
    msgBox.className = "message-box error";
    msgBox.style.display = "block";
  }
})
.catch(err => {
  console.error(err);
  alert("เกิดข้อผิดพลาดในการเชื่อมต่อเซิร์ฟเวอร์");
});
}
  </script>
</body>
</html>
